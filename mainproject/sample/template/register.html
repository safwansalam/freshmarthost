<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fresh Mart - Register</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body {
            background: #28a745;
        }
        .register-box {
            max-width: 400px;
            margin: 80px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }
        .brand {
            color: #1abc72;
            font-weight: bold;
        }
        .btn-green {
            background-color: #1abc72;
            color: white;
            border-radius: 25px;
        }
    </style>
</head>
<body>

<div class="register-box text-center">
    <h4 class="brand">FRESH MART</h4>
    <h5 class="mt-3 mb-4">Create Account</h5>

    <form method="post" action="">
        {% csrf_token %}
        <div class="form-group text-left">
            <label>Username</label>
            <input type="text" class="form-control" name="n1">
        </div>
    <form>
        <div class="form-group text-left">
            <label>Email</label>
            <input type="email" class="form-control" name="n2">
        </div>

        <div class="form-group text-left">
            <label>Phone Number</label>
            <input type="number" class="form-control" name="n3">
        </div>

        <div class="form-group text-left">
            <label>Password</label>
            <input type="text" class="form-control" name="n4">
        </div>

        <div class="form-group text-left">
            <label>re enter Password</label>
            <input type="text" class="form-control" name="n5">
        </div>

        <div class="form-group text-left">
    <label>Register As</label>
    <select class="form-control" name="role">
        <option value="user">User</option>
        <option value="delivery">Delivery Boy</option>
    </select>
        </div>


        <button type="submit" class="btn btn-green btn-block">
            Sign up
        </button>

{% if messages %}
                <div class="alert alert-success alert-dismissible">
                    {% for message in messages %}
    <button type="button" class="close" data-dismiss="alert">&times;</button>
    <strong>{{message}}</strong>
                    {% endfor %}
                </div>
                {% endif %}

    </form>
</div>

</body>
</html>
