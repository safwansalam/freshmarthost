<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FRESH MART - Login</title>

    <!-- Bootstrap 4 CDN -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body {
            background: #28a745;
        }
        .login-box {
            max-width: 400px;
            margin: 80px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }
        .brand {
            color: #1abc72;
            font-weight: bold;
        }
        .btn-green {
            background-color: #1abc72;
            color: white;
            border-radius: 25px;
        }
        .btn-green:hover {
            background-color: #17a864;
        }
        .small-text {
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="login-box text-center">
    <h4 class="brand">FRESH MART</h4>
    <h5 class="mt-3 mb-4">Login</h5>

    <form action="" method="post">
        {% csrf_token %}
        <div class="form-group text-left">
            <label>Username</label>
            <input type="text" class="form-control" placeholder="Enter username" name="n1">
        </div>

        <div class="form-group text-left">
            <label>Password</label>
            <input type="text" class="form-control" placeholder="Enter password" name="n4">
        </div>

        <div class="text-right mb-3 small-text">
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-green btn-block">
            Sign in
        </button>

{% if messages %}
                <div class="alert alert-success alert-dismissible">
                    {% for message in messages %}
    <button type="button" class="close" data-dismiss="alert">&times;</button>
    <strong>{{message}}</strong>
                    {% endfor %}
                </div>
                {% endif %}

        <p class="mt-3 small-text">
            Not Registered Yet?
            <a href="register">Click Here to Signup</a>
        </p>
    </form>
</div>

</body>
</html>
