            .page-bg {
    position: relative;
    min-height: 100vh;
    background-image: url("{% static 'images/bg admin.jpg' %}");
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
}
            .page-bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.35); /* dark overlay */
    z-index: 1;
}

.page-bg > * {
    position: relative;
    z-index: 2;
}
