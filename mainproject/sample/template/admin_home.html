<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}

    <title>Fresh Mart - Admin Panel</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Project CSS -->
    <link rel="stylesheet" type="text/css" href="{% static 'css/vendor.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        /* Background Image */
        .page-bg {
            position: relative;
            min-height: 100vh;
            background-image: url("{% static 'images/bg admin.jpg' %}");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }

        /* Dark overlay */
        .page-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 1;
        }

        .page-bg > * {
            position: relative;
            z-index: 2;
        }

        .welcome-box {
            color: white;
            text-align: center;
            padding-top: 120px;
        }
    </style>
</head>

<body>

<!-- ✅ NEW ADMIN NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm py-2">
<div class="container">

    <!-- Logo -->
    <a class="navbar-brand" href="/admin_home">
        <img src="{% static 'images/freshmartlogo1.png' %}" height="55">
    </a>

    <!-- Toggle -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#mainNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse justify-content-center" id="mainNavbar">
        <ul class="navbar-nav gap-lg-4 text-uppercase">

            <li class="nav-item">
                <a class="nav-link" href="/admin_home">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/add_product">Add Product</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/manage_product">Manage Product</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/subscription">Subscription</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/admin_bookings">Bookings</a>
            </li>
            <li class="nav-item">
                <a href="admin_messages" class="nav-link">Messages</a>
            </li>
        </ul>
    </div>

    <!-- Right Icons -->

        <!-- Logout -->
        <a href="logout" class="nav-link fs-5">
            <i class="bi bi-power"></i>
        </a>
    </div>

</div>
</nav>
<!-- ✅ NAVBAR END -->


<!-- ✅ PAGE BACKGROUND -->
<div class="page-bg">

    <div class="welcome-box">
        <h1>Welcome Admin 👋</h1>
        <p>Manage Products, Plans, and Deliveries from here.</p>
    </div>

</div>


<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/plugins.js' %}"></script>
<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
