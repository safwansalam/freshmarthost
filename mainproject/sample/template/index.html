<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Mart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: url("{% static 'images/bg admin.jpg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
        }

        .hero-text {
            color: white;
            text-align: center;
            padding-top: 150px;
        }

        .btn-custom {
            background-color: #28a745;
            color: white;
            border: none;
        }

        .btn-custom:hover {
            background-color: #218838;
        }

        /* Proper logo alignment */
        .navbar-brand img {
            height: 60px;
            width: auto;
        }
    </style>
</head>

<body>

<div class="overlay">

    <!-- ✅ NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

        <!-- ✅ ONLY LOGO (Text Removed) -->
        <a class="navbar-brand" href="/">
            <img src="{% static 'images/freshmartlogo1.png' %}" alt="FreshMart Logo">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-between" id="navbarNav">

            <!-- Left Menu -->
            <ul class="navbar-nav ms-3">
                <li class="nav-item">
                    <a class="nav-link active" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="user_products">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="subscription">Subscription</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact">Contact</a>
                </li>
            </ul>

            <!-- Login Button -->
            <a href="login" class="btn btn-custom px-4">Login</a>

        </div>
    </nav>

    <!-- ✅ HERO SECTION -->
    <div class="container hero-text">
        <h1 class="display-4 fw-bold">Welcome to Fresh Mart</h1>
        <p class="lead">Fresh Groceries Delivered to Your Doorstep</p>

        <a href="user_home" class="btn btn-success btn-lg mt-3">
            Shop Now
        </a>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
