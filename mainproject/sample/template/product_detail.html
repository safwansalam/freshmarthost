<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <title>Product Detail</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container my-5">
    <div class="card shadow-lg p-4">
        <div class="row align-items-center">

            <!-- Product Image -->
            <div class="col-md-5 text-center">
                <img src="{{ data.image.url }}" class="img-fluid rounded" alt="{{ data.name }}">
            </div>

            <!-- Product Details -->
            <div class="col-md-7">
                <h2 class="fw-bold">{{ data.name }}</h2>

                <h4 class="text-success my-3">₹ {{ data.price }}</h4>

                {% if data.description %}
                <p class="text-muted">{{ data.description }}</p>
                {% endif %}

                <!-- Out of Stock Badge -->
                {% if data.quantity == 0 %}
                <span class="badge bg-danger fs-6 mb-3">⚠ Out of Stock</span>
                {% else %}
                <span class="badge bg-success fs-6 mb-3">✔ In Stock</span>
                {% endif %}

                <div class="d-flex gap-3 mt-4 flex-wrap">

                    <!-- Add to Cart -->
                    <a href="/addcart/{{data.pk}}"
                       class="btn btn-primary btn-lg {% if data.quantity == 0 %}disabled{% endif %}"
                       {% if data.quantity == 0 %}aria-disabled="true"{% endif %}>
                        <i class="bi bi-cart-plus"></i> Add to Cart
                    </a>

                    <!-- Wishlist (always enabled) -->
                    <a href="/add_wishlist/{{data.pk}}" class="btn btn-outline-danger btn-lg">
                        <i class="bi bi-heart"></i> Wishlist
                    </a>

                    <!-- Subscribe Now -->
                    <a href="/subscriptionplan"
                       class="btn btn-primary btn-lg {% if data.quantity == 0 %}disabled{% endif %}"
                       {% if data.quantity == 0 %}aria-disabled="true"{% endif %}>
                        <i class="bi bi-arrow-repeat"></i> Subscribe Now
                    </a>

                    <!-- Buy Now -->
                    <a href="/Buy Now/{{data.pk}}"
                       class="btn btn-success btn-lg {% if data.quantity == 0 %}disabled{% endif %}"
                       {% if data.quantity == 0 %}aria-disabled="true"{% endif %}>
                        <i class="bi bi-bag-check"></i> Buy Now
                    </a>

                </div>

                <div class="mt-4">
                    <a href="/user_products" class="text-decoration-none">← Back to Products</a>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
